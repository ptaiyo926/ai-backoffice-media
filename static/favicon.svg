<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="fav-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="55%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="fav-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background tile -->
  <rect width="64" height="64" rx="14" fill="url(#fav-bg)"/>
  <rect width="64" height="64" rx="14" fill="url(#fav-glow)"/>

  <!-- Letter "A" + cross + Block letter "i" representing AI × Backoffice -->
  <g fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="900">
    <text x="32" y="44" font-size="34" text-anchor="middle" letter-spacing="-1">Ai</text>
  </g>

  <!-- Small accent dot (representing daily) -->
  <circle cx="50" cy="14" r="4" fill="#ffffff" opacity="0.9"/>
  <circle cx="50" cy="14" r="4" fill="#7c3aed" opacity="0.5"/>
</svg>
