<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Decorative grid pattern -->
  <g opacity="0.08" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Top eyebrow -->
  <g transform="translate(100, 110)">
    <rect x="0" y="0" width="280" height="42" rx="21" fill="#ffffff" fill-opacity="0.18" stroke="#ffffff" stroke-opacity="0.25"/>
    <text x="140" y="27" font-family="'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="3">AI × BACKOFFICE</text>
  </g>

  <!-- Main title -->
  <g transform="translate(100, 245)">
    <text x="0" y="0" font-family="'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif" font-size="78" font-weight="800" fill="#ffffff" letter-spacing="-1">AI×バックオフィス</text>
    <text x="0" y="95" font-family="'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif" font-size="78" font-weight="800" fill="#ffffff" letter-spacing="-1">Daily</text>
  </g>

  <!-- Subtitle -->
  <g transform="translate(100, 460)">
    <text x="0" y="0" font-family="'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif" font-size="26" font-weight="500" fill="#ffffff" fill-opacity="0.92">一人社長・経理担当者のための</text>
    <text x="0" y="42" font-family="'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif" font-size="26" font-weight="500" fill="#ffffff" fill-opacity="0.92">AI活用ニュースを毎朝7時にお届け</text>
  </g>

  <!-- URL footer -->
  <g transform="translate(100, 560)">
    <text x="0" y="0" font-family="'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif" font-size="18" font-weight="600" fill="#ffffff" fill-opacity="0.7" letter-spacing="1">ai-backoffice-media.pages.dev</text>
  </g>

  <!-- Right side decorative icon -->
  <g transform="translate(940, 215)" filter="url(#shadow)">
    <rect x="0" y="0" width="180" height="180" rx="36" fill="#ffffff" fill-opacity="0.96"/>
    <g transform="translate(45, 45)">
      <!-- Stylized AI letter mark -->
      <circle cx="45" cy="45" r="40" fill="none" stroke="#2563eb" stroke-width="5"/>
      <path d="M 25 60 L 35 30 L 45 60 M 28 50 L 42 50" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 55 30 L 55 60 M 50 30 L 60 30 M 50 60 L 60 60" fill="none" stroke="#7c3aed" stroke-width="5" stroke-linecap="round"/>
    </g>
    <text x="90" y="158" font-family="'Hiragino Kaku Gothic ProN', sans-serif" font-size="14" font-weight="700" fill="#475569" text-anchor="middle" letter-spacing="3">DAILY</text>
  </g>
</svg>
