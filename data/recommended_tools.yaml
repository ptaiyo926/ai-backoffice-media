      - id: claude
        name: Claude
        company: Anthropic
        color: "#CC785C"
        initial: C
        url: "https://claude.ai"
        referral_url: ""
        overview: |
          Anthropic 社が開発する対話型AI。長文の理解と論理的な思考に強く、社内文書や契約書、議事録などの「文脈を踏まえた読解が必要な業務」と相性が良いツールです。20万トークンを超える長文を扱えるため、複数ファイルや長い文書をまとめて投入できます。
        features: |
          Claude の最大の特徴は、**圧倒的な長文処理能力と日本語の自然さ**です。20万トークン以上のコンテキストを扱えるため、書籍1冊や複数の長文契約書を「丸ごと貼り付けて聞く」使い方ができます。会話のニュアンスを汲んだ日本語生成にも定評があり、敬語や柔らかい言い回しを必要とするビジネスメールの下書きに向いています。

          「**Projects 機能**」を使えば、社内資料・サービス資料・FAQ などをまとめてアップロードし、自社専用のチャットアシスタントを構築できます。質問のたびに同じ前提を伝え直す必要がなく、社内ナレッジを参照しながら回答してくれます。Artifacts 機能ではコードやドキュメント、簡単なスライドをチャット内で即座に生成・編集でき、別ツールに移動せず作業が完結します。

          料金は無料プランから Pro（月20ドル）、Max（月100〜200ドル）、ビジネス向け Team（席単位）まで段階的に用意されています。エンタープライズでも採用が進んでおり、NEC が3万人規模で導入するなど大規模利用にも耐える堅牢性を持っています。
        usage: |
          一人社長の業務では、**業務委託契約書のレビュー**が代表的な使い方です。契約書 PDF をアップロードして「リスクのある条項を抽出して」「相手有利になっている箇所は？」と聞けば、見落としやすいポイントを論点ごとに整理してくれます。税務署や顧問税理士への問い合わせメールも、要点を箇条書きで渡すだけでビジネストーンに整えてくれます。

          経理担当者にとっては、**長文の経理規程や電帳法ガイドラインの要約**が便利です。「自社にとって特に注意すべき点を3つ教えて」のように質問すれば、膨大な文書から実務に直結するエッセンスを抽出できます。英文インボイスを貼り付けて「日本語訳と適切な勘定科目の候補を出して」と依頼するなど、日々の判断補助としても活躍します。

          毎日 Claude を業務で使っているなら、Projects に「会社の基本情報」「過去の Q&A 集」「商品サービス資料」を入れておくのがおすすめ。新人向け FAQ ボットのような形で、メンバーや自分自身の業務効率を底上げできます。
        target:
          - "経理・総務など文書を扱う業務が多い人"
          - "論理性と日本語表現の自然さを重視したい人"
          - "長文ドキュメントをAIに処理させたい人"

      - id: chatgpt
        name: ChatGPT
        company: OpenAI
        color: "#10A37F"
        initial: G
        url: "https://chatgpt.com"
        referral_url: ""
        overview: |
          OpenAI の対話型AI。世界で最もユーザー数が多く、生成AI入門としては鉄板の選択肢です。テキスト・画像・音声に対応するマルチモーダル機能や、独自にカスタマイズした「GPTs」を作れる柔軟性が特徴です。
        features: |
          ChatGPT は最新の GPT-5 系モデルを中核に据えた**総合 AI ワークスペース**です。テキスト生成だけでなく、画像生成、音声会話、データ分析（Code Interpreter）、Web 検索、Deep Research まで1つのインターフェイスでカバーします。Slack、Google Drive、SharePoint、GitHub、Atlassian など60を超える外部サービスと連携できるため、自社データをそのまま読み込ませて分析・要約させる運用が可能です。

          特に強力なのが「**GPTs（カスタム GPT）**」機能で、特定の業務に特化した AI アシスタントを自分で作って共有できます。たとえば「自社の経費規程に従って質問に答える経理ボット」や「営業メールを特定のトーンで生成するアシスタント」を、コードを書かずに5分で作れます。

          料金は無料プランから Plus（月20ドル）、Pro（月200ドル）、ビジネス向け Business（席単位）まであり、2026年4月からは Business プランが「標準シート」と「Codex シート（従量制）」に分離されました。AI を本格的に業務へ組み込みたい場合の柔軟な選択肢が揃っています。
        usage: |
          一人社長にとってまず便利なのは、**会議の文字起こし要約と提案書ドラフト作成**です。Zoom や Google Meet の録音データを投げ込んで「議事録を作って、決定事項と次のアクションを別にまとめて」と頼めば、数分で整理された議事録が手に入ります。SNS 投稿や LP 原稿の量産にも向いており、画像生成と組み合わせればブログ用アイキャッチもまとめて作れます。

          経理担当者は、**Code Interpreter にデータをアップロードする運用**が圧倒的に強力です。売上 CSV を投げて「月次推移をグラフ化して」「前年同月比を出して」と頼めば、Python で集計・グラフ化まで自動でやってくれます。Excel 関数や VBA マクロの作成補助、領収書 PDF からの転記、勘定科目の判断補助なども定番の用途です。

          Deep Research モードでは、補助金や税制改正などのテーマを与えると、複数のソースを横断的に調べて出典付きのレポートを作成します。「3ヶ月間の業界トレンドをまとめて」のような、人が手作業でやると数時間かかる作業を、就寝中に走らせて朝に結果を確認するワークフローが組めます。
        target:
          - "これから AI を業務に取り入れたい初心者"
          - "幅広い業務で AI を試したい人"
          - "視覚資料（画像・スライド）や CSV データ分析を AI に任せたい人"

      - id: gemini
        name: Gemini
        company: Google
        color: "#4285F4"
        initial: G
        url: "https://gemini.google.com"
        referral_url: ""
        overview: |
          Google 社の対話型 AI。Google Workspace（Gmail / Docs / Spreadsheets）との統合が最大の強み。普段から Google サービスを使っている方なら、AIを業務フローに自然に組み込めます。
        features: |
          Gemini の最大の武器は、**Google Workspace へのネイティブ統合**です。2026年初頭からは、Workspace の有料プランすべてに Gemini 機能が標準で同梱されるようになり、Gmail / Docs / Sheets / Meet / Drive のサイドバーや右クリックメニューから直接 AI を呼び出せます。新規ツールを覚える必要がなく、既存の業務フローの「ちょっと右」に AI が常駐しているような体験です。

          性能面では Gemini 3 Pro / Ultra を中核に据え、画像生成（Nano Banana Pro）、動画生成（Veo 3.1）、Deep Research まで統合されています。Google Drive 上のファイルを直接参照できるため、過去の請求書フォルダや議事録フォルダ全体に対して横断検索・要約をかけることも可能です。

          利用料は Workspace の月額に内包される形になり、追加課金なしでフル機能を使えるようになりました。Google アカウントベースで認証されるため、複数人のチームでも管理者がセキュリティとデータ保護を一元的に設定できます。
        usage: |
          一人社長で Gmail を業務メインに使っているなら、**返信ドラフトの自動生成**が日常の中で最も効くポイントです。顧客とのメールスレッドを開いた状態で Gemini を呼び出すと、文脈を読んだ上で返信案を提示してくれます。Google Meet の議事録自動作成、Docs での提案書の章立てサポートなど、いつもの作業の隣に AI がいる感覚で使えます。

          経理担当者にとって秀逸なのが、**Sheets での自動集計**と**Drive の横断検索**です。「Help me organize」を使えば、雑然と並んだ売上一覧から月次集計表や商品別ランキングを自動で組んでくれます。Drive にためた数百件の請求書 PDF に対して「A 社への昨年の支払い総額は？」と聞くだけで、フォルダ全体を解析して回答してくれるのは Gemini ならではです。

          スマートフォン用の Gemini アプリも強力で、領収書を撮影してその場で経費分類・金額抽出を指示できます。出張先や移動中の隙間時間に経費精算の前処理を済ませる、といった使い方も現実的になっています。
        target:
          - "Google Workspace を業務で使っている人"
          - "メール作業に時間を取られている人"
          - "Drive 上の大量資料を活用したい人"

      - id: claude-code
        name: Claude Code
        company: Anthropic
        color: "#D97757"
        initial: CC
        url: "https://www.anthropic.com/claude-code"
        referral_url: ""
        overview: |
          Anthropic 社のターミナル / IDE 上で動作する**コーディング特化AI**。「ファイルの直接編集」「複数ファイルの一括変更」「Git 連携」など、実際にコードを書く作業を AI に任せられます。プログラミング経験がある一人社長にとって、業務自動化の最強ツールの1つ。
        features: |
          Claude Code はターミナル上で動作するエージェント型 AI で、**自然言語で指示するだけでファイルの読み書き・コマンド実行・Git 操作までを自律的に行います**。「このリポジトリを Next.js 14 にアップグレードして」「失敗しているテストを直して」のような曖昧な依頼でも、コードベース全体を読み込んだ上で必要なファイルを判断し、複数ステップの作業を進めてくれます。

          通常のチャット型 AI と決定的に違うのは、「**実際に動くまで自分で試行錯誤する**」点です。コマンドを実行してエラーが出れば、ログを読み、修正案を考え、再実行する。このループを自律的に回せるため、人間は最初の依頼と最終確認だけで成果物を受け取れます。Hugo や Next.js のような既存サイトの改修、API 連携スクリプトの新規作成など、数百行クラスの変更も任せられます。

          料金は Pro（月20ドル）・Max（月100〜200ドル）・Team Premium（席単位）から選べ、Claude Code 単体で年商25億ドル規模に到達。エンタープライズ平均では開発者1人あたり月150〜250ドルの利用が標準になっており、開発生産性に投資する流れが定着しています。
        usage: |
          一人社長で多少のコード経験があるなら、**自社サイトや業務スクリプトの「自前開発」**が一気に現実的になります。Hugo / WordPress / Next.js などで作られた自社サイトの細かい修正、Notion API と Gmail を連携した自動通知 bot、freee API から先月の売上を取得して Slack に投稿する日報スクリプトなど、業者に頼むほどではないけれど自分でやると数日かかる作業を、対話だけで完成させられます。

          経理担当者にとっても、**「Excel/CSV の定型処理マクロ化」**が大きな効果を生みます。たとえば「銀行明細 CSV を会計ソフト用フォーマットに変換するスクリプトを作って」と依頼すれば、フォーマット差分を読み取った上でコンバータを書いてくれます。スプレッドシートや kintone と組み合わせれば、毎月手作業でやっていた処理を完全自動化できます。

          注目すべきは、Claude Code が「コードが書けない人でも、相談を続けるだけで動くものが作れる」点です。エラーが出れば貼り付けるだけ、用語がわからなければ質問するだけ。プログラミング学習と業務自動化を並走できる、ペアプログラミング相手のような存在になります。
        target:
          - "プログラミングの素養がある一人社長・フリーランス"
          - "業務自動化を本格化させたい人"
          - "「コードでバックオフィスを変える」意欲のある人"

      - id: cursor
        name: Cursor
        company: Anysphere
        color: "#000000"
        initial: CR
        url: "https://cursor.com"
        referral_url: ""
        overview: |
          **AIネイティブ設計のコードエディタ**。VS Code をベースに、AI 補完・チャット・エージェントを統合。プロジェクト全体を理解した上でコードを生成してくれるため、未経験者でも「やりたい事を伝えるだけ」で動くコードが出来上がります。
        features: |
          Cursor は VS Code をフォークして AI を中核に据え直したコードエディタで、2026年時点で ARR 20億ドル・有料ユーザー100万人超と、SaaS 史上最速の成長を見せています。リポジトリ全体をインデックスして文脈を理解するため、「この関数と同じパターンであっちのファイルも修正して」のような指示が通用します。

          中でも強力なのが「**Agent Mode**」で、Claude / GPT / Gemini など複数のモデルを使い分けながら、ファイル編集・コマンド実行・テスト実行まで自律的に行います。「新しい機能を追加して、テストを書いて、PR を出すところまでやって」のような大きな指示にも対応できる点が、単なるコード補完ツールとの決定的な違いです。

          料金は無料の Hobby から Pro（月20ドル）、Pro+（月60ドル）、Ultra（月200ドル）、Teams（席単位40ドル）まで。VS Code 互換のため既存の拡張機能やキーバインドがほぼそのまま使え、エンジニアにとっての乗り換えコストは極めて低くなっています。
        usage: |
          一人社長や非エンジニア寄りの経理担当者でも、**ノーコードでは届かない領域の業務ツールを作る**ことが可能です。たとえば顧客台帳の簡易管理画面、freee や Stripe から取得したデータを社内向けに可視化するダッシュボード、請求書 PDF を AI-OCR で抽出してスプレッドシートへ転記するツールなど、対話を続けるだけで動くアプリが完成します。

          コードが書ける人にとっては、**普段の開発生産性が2〜3倍**になります。Tab キーで複数行のリファクタを一気に提案、Cmd+K で選択範囲を自然言語で書き換え、Agent モードで新機能の実装を任せる、といった使い分けで作業ペースが大きく変わります。

          Claude Code がターミナル中心なのに対し、Cursor は GUI のエディタとして使えるため、コードのプレビューや差分確認、Git の履歴を見ながらの作業が直感的です。エディタ画面が必要なエンジニアと、自然言語で対話したい初心者の両方を満たせる設計になっています。
        target:
          - "コードを書く時間が多いエンジニア・副業開発者"
          - "VS Code に慣れているエンジニア兼経営者"
          - "GUI 付きの環境で AI 駆動の開発を体験したい人"

      - id: copilot
        name: GitHub Copilot
        company: GitHub
        color: "#24292F"
        initial: GC
        url: "https://github.com/features/copilot"
        referral_url: ""
        overview: |
          GitHub 純正の AI コード補完サービス。**VS Code / JetBrains / Visual Studio など主要なエディタに対応**しており、コード補完・チャット・PRレビューまで一通り揃っています。GitHub と密に統合されているのが強み。
        features: |
          GitHub Copilot は、コードを書くたびに次の数行を予測して提案してくれる**リアルタイム補完**を中核に据えたツールです。2026年時点では、Agent Mode、Code Review、Copilot Cloud Agent、CLI、Copilot Apps、モデルカタログ（Claude / GPT / Gemini を切り替え可能）まで対応する総合プラットフォームに進化しています。

          特徴的なのは「**GitHub との深い統合**」で、PR の自動レビュー・サマリー生成、Issue から実装案を提案、CI/CD パイプラインの作成補助など、開発のあらゆるフェーズで AI の支援が入ります。組織向けには集中管理機能やポリシー制御が充実しており、エンタープライズでも採用しやすい設計です。

          料金は無料プラン（月50エージェントリクエスト・2000補完）から、Pro（月10ドル）、Pro+（月39ドル）、Business（席単位19ドル）、Enterprise（席単位39ドル）まで。GitHub AI Credits による従量管理ができるため、組織内での利用上限とコストの透明性が保たれます。
        usage: |
          すでに GitHub でコードを管理している一人社長や小規模チームには最適です。VS Code や JetBrains などのエディタに Copilot を入れるだけで、社内ツール開発の生産性が体感で1.5〜2倍に上がります。たとえば経費申請フォームの追加、社内 Wiki の改修、定型レポート出力スクリプトの作成といった「小さい改修の積み重ね」が高速化します。

          経理目線でも、社内向け Web アプリ（経費申請・有給管理など）を GitHub Issues ベースで管理しながら、Copilot に修正案を提案させる運用が有効です。「この Issue を直すコードを書いて」と頼めば、関連ファイルを読み取った上で実装案を提示し、PR まで作成してくれます。

          単体での AI 利用というよりも、「**既存の GitHub ワークフローを賢くする**」位置づけ。Cursor や Claude Code に比べると AI の自律性は控えめですが、馴染みのエディタとシームレスに統合される安心感が魅力です。
        target:
          - "GitHub を業務で使っているエンジニア"
          - "エディタ統合で AI を使いたい人"
          - "PR レビュー・コード提案を AI に任せたいチーム"

      - id: genspark
        name: Genspark
        company: MainFunc
        color: "#FF5C35"
        initial: GS
        url: "https://www.genspark.ai"
        referral_url: ""
        overview: |
          AI が**複数ソースから情報を集約**し、独自の「Sparkpage」というオリジナルページを生成する次世代検索エンジン。リサーチ・調査業務の質と速度を劇的に変えます。AIエージェント機能も強力で、Excel生成やスライド作成まで対応。
        features: |
          Genspark は ChatGPT / Claude / Gemini など複数の AI モデルの応答を統合した「AI Chat」を中心に、**AI Slides（PowerPoint / PDF 書き出し可）・AI Sheets・AI Docs・AI Image / Video・AI Drive（50GB〜1TB）**を組み合わせたオールインワン AI ワークスペースです。最新の画像・動画生成モデル（Nano Banana Pro 2K、Flux 2 Pro、Veo 3.1、PixVerse など）を一括で使えるのも独自の強みです。

          検索結果は単なるリンクの羅列ではなく、**Sparkpage と呼ばれる「1ページにまとまった独自記事」**として返ってきます。出典・データ・図解が整理された状態で読めるので、調査結果をそのまま社内資料や顧客提案に転用できます。Deep Research モードを使えば、時間をかけてさらに精緻な分析レポートを作成します。

          料金は Free（毎日100クレジット）、Plus（月24.99ドル・月10,000クレジット）、Pro（月249.99ドル・月125,000クレジット）。クレジット制で、検索や生成のたびに消費する従量モデルです。アフィリエイトプログラムも公式に存在し、20% の高めの成果報酬が設定されています。
        usage: |
          一人社長は、**営業資料や投資家向け説明資料の量産**で最も効果を実感します。「自社サービスの概要、ターゲット、競合との違いをスライドにして」と指示するだけで、AI Slides がストーリー構成からデザインまで一気に組み上げます。料金プランの比較表、業界マップ、SWOT 分析なども数分で完成度の高い資料に仕上がります。

          リサーチ業務では、Sparkpage を生成する流れがとにかく速く、**競合の動向や業界レポートの「下調べ」が1〜2分**で終わります。「○○業界の主要プレイヤー5社を比較して」「最近のインボイス制度の改正ポイントは？」のように聞くだけで、出典付きの1ページ記事が返ってきます。

          経理担当者向けには、**AI Sheets で売上 CSV をアップして「四半期ごとの伸び率を可視化して」**と頼むワークフローが現実的です。グラフ付き分析シートが完成し、月次の業績報告レポートをそのまま PDF として書き出せます。複数 AI の「いいとこ取り」を一箇所で済ませたいライトユーザーに刺さる構成です。
        target:
