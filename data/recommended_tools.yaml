        company: OpenAI
        color: "#10A37F"
        initial: G
        url: "https://chatgpt.com"
        affiliate_shortcode: ""
        overview: |
          OpenAI の対話型AI。**世界で最もユーザー数が多く**、生成AI入門としては鉄板の選択肢です。テキスト・画像・音声に対応するマルチモーダル機能や、独自にカスタマイズした「GPTs」を作れる柔軟性が特徴です。
        features:
          - "テキスト・画像・音声・動画のマルチモーダル対応"
          - "画像生成（DALL-E）、Code Interpreter（データ分析）"
          - "GPTs：独自AIアシスタントを作って共有可能"
          - "Web検索、Memory、Canvas など豊富な機能"
        usage:
          - "メールや提案書のブラッシュアップ"
          - "Excel/CSVファイルをアップロードしてグラフ化"
          - "「画像生成」でブログ・SNS用イメージを作成"
