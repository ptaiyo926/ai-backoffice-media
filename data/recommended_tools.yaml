          - "議事録から「決定事項・宿題・期限」を抽出"
          - "契約書を読み込ませて「リスクのある条項」を指摘してもらう"
          - "Excel関数の質問（VLOOKUP, IF, ARRAYFORMULA等）"
          - "提案メールのドラフト作成・チェック"
