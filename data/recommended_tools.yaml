        name: Claude
        company: Anthropic
        color: "#CC785C"
        initial: C
        url: "https://claude.ai"
        affiliate_shortcode: ""
        overview: |
          Anthropic 社が開発する対話型AI。**長文の理解と論理的な思考**に強く、社内文書や契約書、議事録などの「文脈を踏まえた読解が必要な業務」と相性が良いツールです。20万トークンを超える長文を扱えるため、複数ファイルや長い文書をまとめて投入できます。
