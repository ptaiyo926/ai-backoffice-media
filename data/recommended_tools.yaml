          - "20万トークン超の長文コンテキスト（書籍1冊分の文書を一括処理）"
          - "Artifacts機能でコード・ドキュメント・スライドを即座に生成"
          - "Projects機能でファイル・指示を保存して継続的に作業"
          - "音声/画像の理解、PDF直接読み取り"
