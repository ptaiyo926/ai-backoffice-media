<article class="article-card">
  <div class="card-meta">
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "1月2日" }}</time>
    {{ with .Params.impact_score }}
      {{ partial "impact-badge.html" . }}
    {{ end }}
  </div>
  <h2 class="card-title">
    <a href="{{ .Permalink }}">{{ .Title }}</a>
  </h2>
  {{ with .Params.summary }}
    <p class="card-summary">{{ . }}</p>
  {{ end }}
  <div class="card-tags">
    {{ range .Params.tags }}
      <a href="/tags/{{ . | urlize }}" class="tag">{{ . }}</a>
    {{ end }}
  </div>
</article>
