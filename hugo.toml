baseURL = "https://ai-backoffice-media.pages.dev/"
languageCode = "ja"
defaultContentLanguage = "ja"
title = "AI×バックオフィス Daily"
paginate = 20
enableRobotsTXT = true

[params]
  description = "会計・バックオフィス領域のAI活用情報を毎日自動配信"
  beehiivUrl = "https://embeds.beehiiv.com/YOUR_FORM_ID"
  twitterHandle = "@ai_backoffice"
  siteUrl = "https://ai-backoffice.jp"

[taxonomies]
  tag = "tags"
  category = "categories"

[markup]
  [markup.highlight]
    style = "github"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  term = ["HTML"]
  taxonomy = ["HTML"]

[related]
  threshold = 60
  includeNewer = true
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "categories"
    weight = 50
  [[related.indices]]
    name = "date"
    weight = 10
